<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArrivEd PH — Chat with AE</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.07); --white: #fff;
  --yellow: #FFD84D; --green: #2DD4A0; --blue: #4A9EFF;
  --muted: #666; --muted2: #999;
}
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }

/* DEMO PAGE */
.demo { text-align: center; max-width: 400px; }
.demo-logo { font-family: 'Unbounded', sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 0.5rem; }
.demo-logo span { color: var(--yellow); }
.demo-sub { font-size: 0.85rem; color: var(--muted2); margin-bottom: 2rem; font-weight: 300; line-height: 1.6; }
.demo-btn { background: var(--yellow); color: var(--black); border: none; padding: 0.85rem 2rem; border-radius: 100px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.demo-btn:hover { background: var(--white); transform: scale(1.03); }

/* CHAT WIDGET */
.chat-bubble {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--yellow);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(255,216,77,0.4);
  transition: all 0.2s;
  z-index: 1000;
}
.chat-bubble:hover { transform: scale(1.08); }
.chat-bubble .ae { font-family: 'Unbounded', sans-serif; font-size: 0.75rem; font-weight: 900; color: var(--black); }

.chat-window {
  position: fixed;
  bottom: 5rem;
  right: 1.5rem;
  width: 320px;
  max-height: 480px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  z-index: 999;
  transform: scale(0.9) translateY(20px);
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.chat-window.open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

/* CHAT HEADER */
.chat-header {
  background: linear-gradient(135deg, #0d2238, #1a3a5c);
  padding: 1rem 1.2rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.ae-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--yellow);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Unbounded', sans-serif;
  font-size: 0.7rem; font-weight: 900;
  color: var(--black);
  flex-shrink: 0;
}
.ae-name { font-weight: 700; font-size: 0.9rem; }
.ae-status { font-size: 0.7rem; color: var(--green); display: flex; align-items: center; gap: 0.3rem; }
.ae-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.chat-close { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 1.1rem; cursor: pointer; }
.chat-close:hover { color: var(--white); }

/* MESSAGES */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  min-height: 200px;
  max-height: 280px;
}

.msg { display: flex; flex-direction: column; gap: 0.2rem; }
.msg.bot { align-items: flex-start; }
.msg.user { align-items: flex-end; }

.msg-bubble {
  max-width: 80%;
  padding: 0.65rem 0.9rem;
  border-radius: 12px;
  font-size: 0.82rem;
  line-height: 1.55;
}
.msg.bot .msg-bubble { background: var(--surface2); color: var(--white); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--blue); color: var(--white); border-bottom-right-radius: 4px; }

.msg-time { font-size: 0.6rem; color: var(--muted); }

/* QUICK REPLIES */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  padding: 0 1rem 0.5rem;
}
.qr {
  background: rgba(74,158,255,0.1);
  border: 1px solid rgba(74,158,255,0.25);
  border-radius: 100px;
  padding: 0.3rem 0.75rem;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--blue);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.qr:hover { background: var(--blue); color: var(--white); }

/* INPUT */
.chat-input-wrap {
  display: flex;
  gap: 0.5rem;
  padding: 0.75rem 1rem;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
.chat-input {
  flex: 1;
  padding: 0.6rem 0.9rem;
  background: var(--black);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.8rem;
  color: var(--white);
  outline: none;
  transition: border-color 0.2s;
}
.chat-input::placeholder { color: var(--muted); }
.chat-input:focus { border-color: rgba(74,158,255,0.4); }
.send-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--yellow);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--white); }
.send-arrow { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid var(--black); margin-left: 2px; }

/* TYPING INDICATOR */
.typing { display: flex; align-items: center; gap: 4px; padding: 0.65rem 0.9rem; background: var(--surface2); border-radius: 12px; border-bottom-left-radius: 4px; width: fit-content; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); animation: typing 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

@media (max-width: 400px) {
  .chat-window { width: calc(100vw - 2rem); right: 1rem; }
}
</style>
</head>
<body>

<div class="demo">
  <div class="demo-logo">Arriv<span>Ed</span> PH</div>
  <p class="demo-sub">This is the AE chatbot widget. Add this to your website and students can chat with AE anytime.</p>
  <button class="demo-btn" onclick="toggleChat()">Chat with AE</button>
</div>

<!-- CHAT BUBBLE -->
<button class="chat-bubble" onclick="toggleChat()" id="chatBubble">
  <span class="ae">AE</span>
</button>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWindow">
  <div class="chat-header">
    <div class="ae-avatar">AE</div>
    <div>
      <div class="ae-name">AE — ArrivEd PH</div>
      <div class="ae-status"><div class="ae-dot"></div> Online now</div>
    </div>
    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="quick-replies" id="quickReplies"></div>

  <div class="chat-input-wrap">
    <input class="chat-input" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMsg()"/>
    <button class="send-btn" onclick="sendMsg()"><div class="send-arrow"></div></button>
  </div>
</div>

<script>
var isOpen = false;
var msgCount = 0;

// RESPONSES
var responses = {
  default: [
    "I am not sure I understand. Can you try asking about our courses, enrollment, pricing, or how to get started?",
    "I did not quite catch that. You can ask me about our free courses, the HTML class, or how to join ArrivEd PH.",
    "Try asking me something like: What courses do you offer? or How do I enroll?"
  ],
  greet: "Hi! I am AE, your learning guide at ArrivEd PH. How can I help you today?",
  courses: "We offer 5 free skill tracks at ArrivEd PH:\n\n1. Web Design and Coding\n2. Digital Marketing\n3. Graphic Design\n4. Video Editing\n5. Social Media Management\n\nAll courses are 100% free. Visit our courses page to enroll.",
  enroll: "Enrolling is easy and completely free. Visit our courses page at:\n\nclairebygh.io/arrivedph/courses.html\n\nClick 'Enroll for Free' on any course and fill in your name and email. We will send you access within 24 hours.",
  html: "Our Web Design and Coding course covers HTML, CSS, and JavaScript over 8 weeks. You will build 4 real projects including a personal portfolio and a business website.\n\nIt is completely free and beginner-friendly. No experience needed.",
  price: "All ArrivEd PH courses are 100% free. No credit card needed. No hidden fees.\n\nWe also offer a Pro plan for P450 per month which gives you access to all courses, mentor sessions, and job matching.",
  certificate: "Yes! Every student who completes a course receives an ArrivEd PH certificate. You can use this to show clients and employers what you can do.",
  job: "After completing a course, you can use your skills to:\n\n- Freelance for businesses on Facebook\n- Apply for jobs through our job board\n- Start your own online service\n\nOur students in the Philippines earn P8,000 to P35,000 per month.",
  about: "ArrivEd PH is a free skills platform for every Filipino student. We help students learn real skills, build real projects, and earn real income — without replacing what their school built.\n\nOur mission: Every student deserves to arrive at the life they worked hard for.",
  contact: "You can reach us at:\n\nFacebook: facebook.com/share/1Zs7cwc9at/\nWebsite: claire7892.github.io/arrivedph/\n\nWe respond to all messages within a few hours.",
  start: "Great! Here is how to get started:\n\n1. Visit our courses page\n2. Pick a skill you want to learn\n3. Click Enroll for Free\n4. We will send you access within 24 hours\n\nYou can also join our free HTML class by commenting I AM IN on our latest Facebook post."
};

var keywords = {
  courses: ['course','courses','skills','learn','learning','what','offer','available','list'],
  enroll: ['enroll','enrolment','join','sign up','register','signup','how to join'],
  html: ['html','css','javascript','web','coding','website','design','code'],
  price: ['price','cost','free','pay','payment','fee','bayad','libre','how much'],
  certificate: ['certificate','cert','certify','proof','completion'],
  job: ['job','work','earn','income','money','client','freelance','kita','pera'],
  about: ['about','what is','arrivedph','platform','arriv','mission','what are you'],
  contact: ['contact','reach','message','email','facebook','talk','speak'],
  start: ['start','begin','first','how','getting started','new','beginner'],
  greet: ['hi','hello','hey','good morning','good afternoon','good evening','kumusta','kamusta']
};

function getResponse(msg) {
  var lower = msg.toLowerCase();
  for (var key in keywords) {
    var words = keywords[key];
    for (var i = 0; i < words.length; i++) {
      if (lower.includes(words[i])) {
        return responses[key];
      }
    }
  }
  return responses.default[Math.floor(Math.random() * responses.default.length)];
}

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMsg(text, type) {
  var msgs = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg ' + type;

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.style.whiteSpace = 'pre-line';
  bubble.textContent = text;

  var time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();

  div.appendChild(bubble);
  div.appendChild(time);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  var msgs = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  var t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  div.appendChild(t);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typing');
  if (t) t.remove();
}

function setQuickReplies(replies) {
  var qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  replies.forEach(function(r) {
    var btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = r;
    btn.onclick = function() { processMsg(r); };
    qr.appendChild(btn);
  });
}

function sendMsg() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  processMsg(msg);
}

function processMsg(msg) {
  document.getElementById('quickReplies').innerHTML = '';
  addMsg(msg, 'user');
  showTyping();
  setTimeout(function() {
    removeTyping();
    var reply = getResponse(msg);
    addMsg(reply, 'bot');
    // Set context-based quick replies
    var lower = msg.toLowerCase();
    if (lower.includes('course') || lower.includes('learn') || lower.includes('skill')) {
      setQuickReplies(['Tell me about HTML', 'How do I enroll?', 'Is it free?']);
    } else if (lower.includes('free') || lower.includes('price') || lower.includes('cost')) {
      setQuickReplies(['How do I start?', 'What courses are there?', 'How do I enroll?']);
    } else if (lower.includes('html') || lower.includes('web') || lower.includes('code')) {
      setQuickReplies(['How do I enroll?', 'Do I get a certificate?', 'Can I earn money?']);
    } else {
      setQuickReplies(['What courses do you offer?', 'Is it really free?', 'How do I start?']);
    }
  }, 1200);
}

function toggleChat() {
  isOpen = !isOpen;
  var win = document.getElementById('chatWindow');
  if (isOpen) {
    win.classList.add('open');
    if (msgCount === 0) {
      setTimeout(function() {
        addMsg("Hi! I am AE, your learning guide at ArrivEd PH.", 'bot');
        setTimeout(function() {
          addMsg("I can help you with our free courses, enrollment, pricing, and more. What would you like to know?", 'bot');
          setQuickReplies(['What courses do you offer?', 'Is it really free?', 'How do I start?', 'About ArrivEd PH']);
          msgCount++;
        }, 800);
      }, 300);
    }
  } else {
    win.classList.remove('open');
  }
}
</script>
</body>
</html>
